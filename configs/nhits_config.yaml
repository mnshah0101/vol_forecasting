model:
  _target_: vol_forecasting.models.nhits.NHiTS
  lookback: 1800
  n_blocks: [1, 1, 1, 1]
  mlp_units: [[32, 16], [16, 8], [8, 4], [4, 4]]
  n_pool_kernel_size: [900, 300, 60, 1]
  n_freq_downsample: [1, 1, 1, 1]
  dropout: 0.5
  activation: ReLU

data:
  path: /home/hice1/mshah415/work/btc_research/vol_forecasting/data/output.parquet
  products: [s, p, e]
  train_frac: 0.8
  val_frac: 0.1

training:
  horizon: 15m
  stride: 1
  batch_size: 4096
  lr: 1e-3
  weight_decay: 0.01
  epochs: 30
  patience: 5
  use_compile: true
  loss_mode: log_mse        # log_mse | raw_mse | raw_huber | mixed_mse
  loss_alpha: 1.0           # mixed_mse only: 1.0=pure log, 0.0=pure level-space
  target_clip: null          # clip normalized targets to [-x, x] (null = disabled)
  variable_horizon:
    enabled: false
    min_horizon: 1
    max_horizon: 900
  pricing_head:
    enabled: false
    bce_weight: 0.1
    period_len: 900
    kwargs:
      hidden_units: [64, 32]
      dropout: 0.1

device: cuda
save_path: null  # defaults to nhits_{horizon}.pt
jsu_params_path: null  # path to JSU params CSV (e.g. pricing/configs/jsu.csv)
